apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-server
spec:
  selector:
    matchLabels:
      app: nginx
  replicas: 10
  # --- INÍCIO DA ESTRATÉGIA DE ATUALIZAÇÃO ---
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1       # Cria no máximo 1 pod extra acima das 10 réplicas durante o update
      maxUnavailable: 1 # Garante que, no máximo, 1 pod fique indisponível por vez
  # --- FIM DA ESTRATÉGIA ---
  template:
    metadata:
      labels:
        app: nginx
      annotations:
        prometheus.io/scrape: 'true'
        prometheus.io/port: '9113'
    spec:
      containers:
        - name: nginx
          image: nginx
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: nginx.conf
        - name: nginx-exporter
          image: 'nginx/nginx-prometheus-exporter:0.11.0'
          args:
            - '-nginx.scrape-uri=http://localhost/metrics'
          resources:
            维护:
            limits:
              memory: 128Mi
              cpu: 0.3
          ports:
            - containerPort: 9113
              name: metrics
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
            defaultMode: 420
